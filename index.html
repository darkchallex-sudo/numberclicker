<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Clicker</title>
</head>

<body>

<main class="stage" id="stage">
    <div class="ambient ambient-a"></div>
    <div class="ambient ambient-b"></div>
    <div class="ambient ambient-c"></div>

    <button id="backpackButton" class="backpack-button" type="button" aria-expanded="false" aria-controls="backpackPanel">
        <span class="backpack-icon" aria-hidden="true">[+]</span>
        <span>Backpack</span>
    </button>

    <button id="luckMachineButton" class="luck-machine-button" type="button" aria-expanded="false" aria-controls="luckMachinePanel">
        <span class="luck-machine-icon" aria-hidden="true">$</span>
        <span>Luck Machine</span>
    </button>

    <button id="coinMachineButton" class="coin-machine-button" type="button" aria-expanded="false" aria-controls="coinMachinePanel">
        <span class="luck-machine-icon coin-machine-icon" aria-hidden="true">$</span>
        <span>Coin Machine</span>
    </button>

    <button id="musicToggleButton" class="music-toggle-button" type="button" aria-expanded="false" aria-controls="musicPanel">
        <span class="music-toggle-icon" aria-hidden="true">~</span>
        <span id="musicToggleText">Music</span>
    </button>

    <aside id="musicPanel" class="music-panel hidden" aria-hidden="true">
        <div class="music-panel-header">
            <div>
                <p class="panel-kicker">Background Audio</p>
                <h2>Music</h2>
            </div>
            <button id="closeMusicPanelButton" class="close-panel" type="button">X</button>
        </div>

        <button id="calmMusicButton" type="button">Play Calm Music</button>

        <div id="spotifyPlayerHost"></div>
        <div id="spotifySongList"></div>
    </aside>

    <section class="core">
        <p class="hint">Click the button. Chase the impossible.</p>

        <div class="number-wrap">
            <span class="number-label">Number</span>
            <h1 id="numberValue">0</h1>
        </div>

        <button id="clickButton" class="click-button" type="button">Generate Number</button>

        <p id="saveText">Checking save status...</p>
        <p id="microText">120 achievements exist. Some of them will wake up the screen.</p>
        <p id="findText">Current best find: None</p>
    </section>

</main>

<template id="boosterTemplate">
    <article class="booster-card">
        <h3 class="booster-name"></h3>
        <p class="booster-description"></p>
        <button class="booster-buy" type="button">Buy</button>
    </article>
</template>

<script src="script.js"></script>

</body>
</html>
